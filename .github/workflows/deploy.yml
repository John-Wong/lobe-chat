name: Deploy
on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Needed for auth with Deno Deploy
      contents: read # Needed to clone the repository

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install step
        run: "npm install -g bun && bun install --legacy-peer-deps"

      - name: Build step
        run: "bun run build:docker && (mkdir -p .next/standalone/public; cp -r public .next/standalone/public; mkdir -p .next/standalone/.next/static; cp -r .next/static .next/standalone/.next/static)"

      - name: Upload to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "lbc"
          entrypoint: "npm:start"
          root: ".next/standalone"
          
          
